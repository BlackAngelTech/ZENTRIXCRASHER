<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VECTOR CRASHER | Chatroom</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* same base cyber style as other pages */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a1a; font-family: 'Rajdhani', sans-serif; color: #eee; overflow-x: hidden; min-height: 100vh; }
    /* particles, scanlines, sidebar, etc. – reuse styles from dashboard.html */
    .chat-container { max-width: 1200px; margin: 100px auto 20px; padding: 20px; display: flex; gap: 20px; flex-wrap: wrap; }
    .sidebar-chat { width: 280px; background: rgba(10,20,40,0.6); backdrop-filter: blur(12px); border-radius: 20px; padding: 15px; border: 1px solid cyan; }
    .main-chat { flex: 1; background: rgba(10,20,40,0.4); backdrop-filter: blur(8px); border-radius: 20px; padding: 20px; border: 1px solid rgba(0,240,255,0.3); }
    .chat-header { border-bottom: 1px solid cyan; padding-bottom: 10px; margin-bottom: 20px; }
    .messages { height: 400px; overflow-y: auto; margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
    .message-bubble { max-width: 70%; padding: 8px 12px; border-radius: 18px; background: rgba(0,0,0,0.5); }
    .my-message { align-self: flex-end; background: linear-gradient(135deg, cyan, magenta); color: black; }
    .other-message { align-self: flex-start; background: #2a2a3a; }
    .message-media { max-width: 200px; border-radius: 12px; margin-top: 5px; cursor: pointer; }
    .input-area { display: flex; gap: 10px; flex-wrap: wrap; }
    .input-area input { flex: 1; background: rgba(0,0,0,0.6); border: 1px solid cyan; padding: 10px; border-radius: 30px; color: white; }
    .input-area button { background: cyan; border: none; padding: 10px 20px; border-radius: 30px; font-weight: bold; }
    .file-input { position: relative; }
    .file-input input { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
    .channel-item, .group-item { padding: 10px; margin: 5px 0; background: rgba(0,0,0,0.3); border-radius: 12px; cursor: pointer; }
    .channel-item.active, .group-item.active { background: cyan; color: black; }
    .premium-badge { background: gold; color: black; font-size: 0.7rem; padding: 2px 6px; border-radius: 12px; margin-left: 8px; }
  </style>
</head>
<body>
<canvas id="particles-canvas"></canvas>
<div class="scanlines"></div>
<div class="grid-overlay"></div>
<div class="cursor-glow" id="cursorGlow"></div>
<div class="overlay"></div>
<div class="hamburger" onclick="toggleSidebar()">
  <span></span><span></span><span></span>
</div>
<div class="sidebar" id="sidebar">
  <a href="/dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
  <a href="/connect.html"><i class="fab fa-whatsapp"></i> Connect Device</a>
  <a href="/ban.html"><i class="fas fa-skull"></i> Ban Panel</a>
  <a href="/unban.html"><i class="fas fa-infinity"></i> Unban Panel</a>
  <a href="/media.html"><i class="fas fa-photo-video"></i> Media Hub</a>
  <a href="/chatroom.html"><i class="fas fa-comments"></i> Chatroom</a>
  <a href="/api.html"><i class="fas fa-code"></i> API Docs</a>
  <a href="/account.html"><i class="fas fa-user-cog"></i> Account</a>
  <a href="/developers.html"><i class="fas fa-code-branch"></i> Developers / Support</a>
  <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>
<div class="chat-container">
  <div class="sidebar-chat">
    <h3><i class="fas fa-newspaper"></i> Channels</h3>
    <div id="channelsList"></div>
    <h3 style="margin-top:20px;"><i class="fas fa-users"></i> Groups</h3>
    <div id="groupsList"></div>
  </div>
  <div class="main-chat">
    <div class="chat-header" id="chatHeader">Select a channel or group</div>
    <div class="messages" id="messagesList"></div>
    <div class="input-area">
      <input type="text" id="messageInput" placeholder="Type a message...">
      <div class="file-input">
        <button><i class="fas fa-paperclip"></i></button>
        <input type="file" id="mediaInput" accept="image/*,video/*,audio/*">
      </div>
      <button id="sendMsgBtn"><i class="fas fa-paper-plane"></i> Send</button>
    </div>
  </div>
</div>
<a href="https://whatsapp.com/channel/0029VbD1fqe5kg6xDhBs5G3M" target="_blank" class="whatsapp-float">
  <i class="fab fa-whatsapp"></i>
</a>
<script>
  const token = localStorage.getItem('authToken') || sessionStorage.getItem('authToken');
  if (!token) window.location.href = '/login.html';
  let currentChat = null; // { type: 'channel' or 'group', id }
  let messageInterval = null;

  // Load channels and groups
  async function loadChats() {
    const [channelsRes, groupsRes] = await Promise.all([
      fetch('/api/channels', { headers: { 'Authorization': `Bearer ${token}` } }).then(r=>r.json()),
      fetch('/api/groups', { headers: { 'Authorization': `Bearer ${token}` } }).then(r=>r.json())
    ]);
    if (channelsRes.success) {
      document.getElementById('channelsList').innerHTML = channelsRes.channels.map(ch => `<div class="channel-item" data-id="${ch.id}" data-name="${ch.name}">📢 ${ch.name}</div>`).join('');
      document.querySelectorAll('.channel-item').forEach(el => {
        el.addEventListener('click', () => { selectChat('channel', el.dataset.id, el.dataset.name); });
      });
    }
    if (groupsRes.success) {
      document.getElementById('groupsList').innerHTML = groupsRes.groups.map(g => `<div class="group-item" data-id="${g.id}" data-name="${g.name}">👥 ${g.name} ${g.premium ? '<span class="premium-badge">PREMIUM</span>' : ''}</div>`).join('');
      document.querySelectorAll('.group-item').forEach(el => {
        el.addEventListener('click', () => { selectChat('group', el.dataset.id, el.dataset.name); });
      });
    }
  }

  function selectChat(type, id, name) {
    currentChat = { type, id };
    document.getElementById('chatHeader').innerHTML = `<i class="fas ${type === 'channel' ? 'fa-newspaper' : 'fa-users'}"></i> ${name}`;
    loadMessages();
    if (messageInterval) clearInterval(messageInterval);
    messageInterval = setInterval(loadMessages, 3000);
  }

  async function loadMessages() {
    if (!currentChat) return;
    const res = await fetch(`/api/messages?chatType=${currentChat.type}&chatId=${currentChat.id}`, { headers: { 'Authorization': `Bearer ${token}` } });
    const data = await res.json();
    if (data.success) {
      const container = document.getElementById('messagesList');
      container.innerHTML = data.messages.map(msg => `
        <div class="message-bubble ${msg.senderId === currentUserId ? 'my-message' : 'other-message'}">
          <strong>${msg.senderName}</strong><br>
          ${msg.text ? msg.text : ''}
          ${msg.mediaUrl ? `<div><img src="${msg.mediaUrl}" class="message-media" onclick="window.open('${msg.mediaUrl}')"></div>` : ''}
          <small style="font-size:0.7rem;">${new Date(msg.timestamp).toLocaleTimeString()}</small>
        </div>
      `).join('');
      container.scrollTop = container.scrollHeight;
    }
  }

  async function sendMessage() {
    const text = document.getElementById('messageInput').value.trim();
    const mediaFile = document.getElementById('mediaInput').files[0];
    if (!text && !mediaFile) return;
    let mediaUrl = null;
    if (mediaFile) {
      const formData = new FormData();
      formData.append('media', mediaFile);
      const uploadRes = await fetch('/api/upload-chat-media', { method: 'POST', headers: { 'Authorization': `Bearer ${token}` }, body: formData });
      const uploadData = await uploadRes.json();
      if (uploadData.success) mediaUrl = uploadData.url;
      else alert('Media upload failed');
    }
    if (text || mediaUrl) {
      await fetch('/api/send-message', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ chatType: currentChat.type, chatId: currentChat.id, text, mediaUrl })
      });
      document.getElementById('messageInput').value = '';
      document.getElementById('mediaInput').value = '';
      loadMessages();
    }
  }

  document.getElementById('sendMsgBtn').addEventListener('click', sendMessage);
  document.getElementById('messageInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

  // Particles, sidebar, logout (reuse from dashboard)
  // ... [particle and sidebar code omitted for brevity, copy from dashboard]
  loadChats();
</script>
</body>
</html>
