<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>VECTOR CRASHER | Forgot Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a1a;
      font-family: 'Rajdhani', sans-serif;
      color: #eee;
      overflow-x: hidden;
      min-height: 100vh;
    }

    #particles-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .scanlines {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(0deg, rgba(0,255,255,0.03) 0px, rgba(0,255,255,0.03) 2px, transparent 2px, transparent 6px);
      pointer-events: none;
      z-index: 3;
    }

    .grid-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(0,240,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,240,255,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 2;
    }

    .cursor-glow {
      position: fixed;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,240,255,0.15), transparent 70%);
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 1;
      transition: transform 0.05s linear;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 20%, rgba(0,240,255,0.05), rgba(0,0,0,0.7));
      z-index: 1;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 10;
      max-width: 480px;
      margin: 0 auto;
      padding: 110px 20px 60px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 1s ease-out forwards;
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .glass-card {
      background: rgba(10, 20, 40, 0.65);
      backdrop-filter: blur(16px);
      border-radius: 32px;
      padding: 40px 30px;
      border: 1px solid rgba(0, 240, 255, 0.4);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      margin-bottom: 25px;
    }

    .logo svg {
      width: 50px;
      height: 50px;
      filter: drop-shadow(0 0 8px cyan);
      animation: pulseGlow 2s infinite;
    }

    @keyframes pulseGlow {
      0%, 100% { filter: drop-shadow(0 0 4px cyan); }
      50% { filter: drop-shadow(0 0 15px magenta); }
    }

    .logo-text {
      font-family: 'Orbitron', monospace;
      font-size: 1.6rem;
      font-weight: 900;
      background: linear-gradient(135deg, #00f0ff, #ff00aa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 2px;
    }

    h1 {
      font-family: 'Orbitron', monospace;
      font-size: 1.6rem;
      text-align: center;
      margin-bottom: 20px;
      color: cyan;
      text-shadow: 0 0 6px cyan;
    }

    .input-group {
      margin-bottom: 25px;
    }

    .input-group input {
      width: 100%;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(0,240,255,0.4);
      padding: 14px 18px;
      border-radius: 40px;
      color: #fff;
      font-size: 0.95rem;
      transition: 0.2s;
    }

    .input-group input:focus {
      outline: none;
      border-color: cyan;
      box-shadow: 0 0 12px rgba(0,240,255,0.3);
    }

    button {
      width: 100%;
      background: linear-gradient(135deg, #00f0ff, #aa00ff);
      border: none;
      padding: 14px;
      border-radius: 40px;
      font-weight: bold;
      font-size: 1.1rem;
      color: #000;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
    }

    button:hover {
      transform: scale(1.02);
      box-shadow: 0 0 25px cyan;
    }

    .back-link {
      text-align: center;
      margin-top: 25px;
      font-size: 0.9rem;
    }

    .back-link a {
      color: cyan;
      text-decoration: none;
    }

    .back-link a:hover {
      text-decoration: underline;
    }

    .message {
      margin-top: 18px;
      text-align: center;
      font-size: 0.85rem;
      padding: 8px;
      border-radius: 20px;
    }

    .error {
      color: #ff6666;
      background: rgba(255,0,0,0.1);
    }

    .success {
      color: #66ff66;
      background: rgba(0,255,0,0.1);
    }

    .whatsapp-float {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #25D366;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: white;
      box-shadow: 0 0 20px rgba(37, 211, 102, 0.6);
      transition: 0.3s;
      z-index: 20;
      animation: pulseWhatsApp 1.5s infinite;
      text-decoration: none;
    }

    .whatsapp-float:hover {
      transform: scale(1.1);
      box-shadow: 0 0 35px #25D366;
    }

    @keyframes pulseWhatsApp {
      0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
      70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
      100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
    }

    footer {
      text-align: center;
      margin-top: 40px;
      font-size: 0.7rem;
      opacity: 0.6;
    }

    @media (max-width: 600px) {
      .container { padding: 80px 16px 40px; }
      .glass-card { padding: 30px 20px; }
      .logo-text { font-size: 1.2rem; }
      .logo svg { width: 40px; height: 40px; }
    }
  </style>
</head>
<body>

<canvas id="particles-canvas"></canvas>
<div class="scanlines"></div>
<div class="grid-overlay"></div>
<div class="cursor-glow" id="cursorGlow"></div>
<div class="overlay"></div>

<a href="https://whatsapp.com/channel/0029VbD1fqe5kg6xDhBs5G3M" target="_blank" class="whatsapp-float">
  <i class="fab fa-whatsapp"></i>
</a>

<div class="container">
  <div class="glass-card">
    <div class="logo">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 10 L70 25 L80 50 L70 75 L50 90 L30 75 L20 50 L30 25 L50 10Z" fill="none" stroke="#00f0ff" stroke-width="2"/>
        <circle cx="38" cy="45" r="3" fill="#ff00ff"/>
        <circle cx="62" cy="45" r="3" fill="#ff00ff"/>
        <path d="M45 60 Q50 68 55 60" stroke="#00f0ff" stroke-width="2" fill="none"/>
        <path d="M50 75 L50 85 M40 80 L50 85 L60 80" stroke="#ff00ff" stroke-width="1.5"/>
      </svg>
      <span class="logo-text">VECTOR CRASHER</span>
    </div>
    <h1><i class="fas fa-key"></i> RESET PASSWORD</h1>
    <form id="forgotForm">
      <div class="input-group">
        <input type="email" id="email" placeholder="Your Gmail address (only @gmail.com)" required>
      </div>
      <button type="submit"><i class="fas fa-paper-plane"></i> SEND RESET LINK</button>
    </form>
    <div class="back-link">
      <a href="/login.html"><i class="fas fa-arrow-left"></i> Back to Login</a>
    </div>
    <div id="message" class="message"></div>
  </div>
  <footer>© 2026 VECTOR CRASHER — ZENTRIX TECH</footer>
</div>

<script>
  // Mouse glow
  const cursorGlow = document.getElementById('cursorGlow');
  document.addEventListener('mousemove', (e) => {
    cursorGlow.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
  });

  // Particles
  const canvas = document.getElementById('particles-canvas');
  const ctx = canvas.getContext('2d');
  let particles = [];

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function createParticles() {
    const particleCount = 120;
    for (let i = 0; i < particleCount; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: Math.random() * 2.5 + 1,
        speedX: (Math.random() - 0.5) * 0.8,
        speedY: (Math.random() - 0.5) * 0.6,
        color: `rgba(0, ${Math.floor(150 + Math.random() * 105)}, 255, ${Math.random() * 0.6 + 0.2})`
      });
    }
  }

  function drawParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let p of particles) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
      p.x += p.speedX;
      p.y += p.speedY;
      if (p.x < 0) p.x = canvas.width;
      if (p.x > canvas.width) p.x = 0;
      if (p.y < 0) p.y = canvas.height;
      if (p.y > canvas.height) p.y = 0;
    }
    requestAnimationFrame(drawParticles);
  }

  window.addEventListener('resize', () => {
    resizeCanvas();
    particles = [];
    createParticles();
  });
  resizeCanvas();
  createParticles();
  drawParticles();

  // Form handler
  const form = document.getElementById('forgotForm');
  const messageDiv = document.getElementById('message');

  function showMessage(msg, type) {
    messageDiv.innerHTML = msg;
    messageDiv.className = 'message';
    if (type === 'error') messageDiv.classList.add('error');
    if (type === 'success') messageDiv.classList.add('success');
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const emailPattern = /^[a-zA-Z0-9._%+-]+@gmail\.com$/;
    if (!emailPattern.test(email)) {
      showMessage('❌ Only Gmail addresses are allowed.', 'error');
      return;
    }

    showMessage('⏳ Sending reset link...', 'success');

    try {
      const res = await fetch('/api/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      const data = await res.json();
      if (data.success) {
        showMessage('✅ Reset link sent to your email. Check inbox/spam.', 'success');
        setTimeout(() => window.location.href = '/login.html', 4000);
      } else {
        showMessage('❌ ' + (data.message || 'Email not found or not approved.'), 'error');
      }
    } catch (err) {
      console.error(err);
      showMessage('❌ Server error. Try again later.', 'error');
    }
  });
</script>
</body>
</html>
