<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>VECTOR CRASHER | Create New Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a1a;
      font-family: 'Rajdhani', sans-serif;
      color: #eee;
      overflow-x: hidden;
      min-height: 100vh;
    }

    #particles-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .scanlines {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(0deg, rgba(0,255,255,0.03) 0px, rgba(0,255,255,0.03) 2px, transparent 2px, transparent 6px);
      pointer-events: none;
      z-index: 3;
    }

    .grid-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(0,240,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,240,255,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 2;
    }

    .cursor-glow {
      position: fixed;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,240,255,0.15), transparent 70%);
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 1;
      transition: transform 0.05s linear;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 20%, rgba(0,240,255,0.05), rgba(0,0,0,0.7));
      z-index: 1;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 10;
      max-width: 480px;
      margin: 0 auto;
      padding: 100px 20px 60px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 1s ease-out forwards;
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .glass-card {
      background: rgba(10, 20, 40, 0.65);
      backdrop-filter: blur(16px);
      border-radius: 32px;
      padding: 40px 30px;
      border: 1px solid rgba(0, 240, 255, 0.4);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      margin-bottom: 25px;
    }

    .logo svg {
      width: 50px;
      height: 50px;
      filter: drop-shadow(0 0 8px cyan);
      animation: pulseGlow 2s infinite;
    }

    @keyframes pulseGlow {
      0%, 100% { filter: drop-shadow(0 0 4px cyan); }
      50% { filter: drop-shadow(0 0 15px magenta); }
    }

    .logo-text {
      font-family: 'Orbitron', monospace;
      font-size: 1.6rem;
      font-weight: 900;
      background: linear-gradient(135deg, #00f0ff, #ff00aa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 2px;
    }

    h1 {
      font-family: 'Orbitron', monospace;
      font-size: 1.5rem;
      text-align: center;
      margin-bottom: 20px;
      color: cyan;
      text-shadow: 0 0 6px cyan;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-group input {
      width: 100%;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(0,240,255,0.4);
      padding: 14px 18px;
      border-radius: 40px;
      color: #fff;
      font-size: 0.95rem;
      transition: 0.2s;
    }

    .input-group input:focus {
      outline: none;
      border-color: cyan;
      box-shadow: 0 0 12px rgba(0,240,255,0.3);
    }

    .password-strength {
      margin-top: 6px;
      font-size: 0.7rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .strength-bar {
      flex: 1;
      height: 4px;
      background: #333;
      border-radius: 4px;
      overflow: hidden;
    }

    .strength-fill {
      width: 0%;
      height: 100%;
      transition: width 0.2s;
    }

    .strength-text {
      min-width: 80px;
      text-align: right;
    }

    button {
      width: 100%;
      background: linear-gradient(135deg, #00f0ff, #aa00ff);
      border: none;
      padding: 14px;
      border-radius: 40px;
      font-weight: bold;
      font-size: 1.1rem;
      color: #000;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
    }

    button:hover {
      transform: scale(1.02);
      box-shadow: 0 0 25px cyan;
    }

    .message {
      margin-top: 18px;
      text-align: center;
      font-size: 0.85rem;
      padding: 8px;
      border-radius: 20px;
    }

    .error {
      color: #ff6666;
      background: rgba(255,0,0,0.1);
    }

    .success {
      color: #66ff66;
      background: rgba(0,255,0,0.1);
    }

    .whatsapp-float {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #25D366;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: white;
      box-shadow: 0 0 20px rgba(37, 211, 102, 0.6);
      transition: 0.3s;
      z-index: 20;
      animation: pulseWhatsApp 1.5s infinite;
      text-decoration: none;
    }

    .whatsapp-float:hover {
      transform: scale(1.1);
      box-shadow: 0 0 35px #25D366;
    }

    @keyframes pulseWhatsApp {
      0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
      70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
      100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
    }

    footer {
      text-align: center;
      margin-top: 40px;
      font-size: 0.7rem;
      opacity: 0.6;
    }

    @media (max-width: 600px) {
      .container { padding: 80px 16px 40px; }
      .glass-card { padding: 30px 20px; }
      .logo-text { font-size: 1.2rem; }
      .logo svg { width: 40px; height: 40px; }
    }
  </style>
</head>
<body>

<canvas id="particles-canvas"></canvas>
<div class="scanlines"></div>
<div class="grid-overlay"></div>
<div class="cursor-glow" id="cursorGlow"></div>
<div class="overlay"></div>

<a href="https://whatsapp.com/channel/0029VbD1fqe5kg6xDhBs5G3M" target="_blank" class="whatsapp-float">
  <i class="fab fa-whatsapp"></i>
</a>

<div class="container">
  <div class="glass-card">
    <div class="logo">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 10 L70 25 L80 50 L70 75 L50 90 L30 75 L20 50 L30 25 L50 10Z" fill="none" stroke="#00f0ff" stroke-width="2"/>
        <circle cx="38" cy="45" r="3" fill="#ff00ff"/>
        <circle cx="62" cy="45" r="3" fill="#ff00ff"/>
        <path d="M45 60 Q50 68 55 60" stroke="#00f0ff" stroke-width="2" fill="none"/>
        <path d="M50 75 L50 85 M40 80 L50 85 L60 80" stroke="#ff00ff" stroke-width="1.5"/>
      </svg>
      <span class="logo-text">VECTOR CRASHER</span>
    </div>
    <h1><i class="fas fa-lock-open"></i> NEW PASSWORD</h1>
    <form id="resetForm">
      <div class="input-group">
        <input type="password" id="newPassword" placeholder="New password (strong)" required>
        <div class="password-strength">
          <span>Strength:</span>
          <div class="strength-bar">
            <div class="strength-fill" id="strengthFill"></div>
          </div>
          <span class="strength-text" id="strengthText">Very Weak</span>
        </div>
      </div>
      <div class="input-group">
        <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
      </div>
      <button type="submit"><i class="fas fa-check-circle"></i> RESET PASSWORD</button>
    </form>
    <div id="message" class="message"></div>
  </div>
  <footer>© 2026 VECTOR CRASHER — ZENTRIX TECH</footer>
</div>

<script>
  // Get token from URL
  const urlParams = new URLSearchParams(window.location.search);
  const token = urlParams.get('token');

  if (!token) {
    document.getElementById('message').innerHTML = '❌ Invalid or missing reset token. Please request a new reset link.';
    document.getElementById('message').className = 'message error';
    document.querySelector('button').disabled = true;
  }

  // Mouse glow
  const cursorGlow = document.getElementById('cursorGlow');
  document.addEventListener('mousemove', (e) => {
    cursorGlow.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
  });

  // Particles
  const canvas = document.getElementById('particles-canvas');
  const ctx = canvas.getContext('2d');
  let particles = [];

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function createParticles() {
    const particleCount = 120;
    for (let i = 0; i < particleCount; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: Math.random() * 2.5 + 1,
        speedX: (Math.random() - 0.5) * 0.8,
        speedY: (Math.random() - 0.5) * 0.6,
        color: `rgba(0, ${Math.floor(150 + Math.random() * 105)}, 255, ${Math.random() * 0.6 + 0.2})`
      });
    }
  }

  function drawParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let p of particles) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
      p.x += p.speedX;
      p.y += p.speedY;
      if (p.x < 0) p.x = canvas.width;
      if (p.x > canvas.width) p.x = 0;
      if (p.y < 0) p.y = canvas.height;
      if (p.y > canvas.height) p.y = 0;
    }
    requestAnimationFrame(drawParticles);
  }

  window.addEventListener('resize', () => {
    resizeCanvas();
    particles = [];
    createParticles();
  });
  resizeCanvas();
  createParticles();
  drawParticles();

  // Password strength meter
  const passwordInput = document.getElementById('newPassword');
  const strengthFill = document.getElementById('strengthFill');
  const strengthText = document.getElementById('strengthText');

  function checkStrength(pw) {
    let score = 0;
    if (pw.length >= 8) score++;
    if (pw.match(/[A-Z]/)) score++;
    if (pw.match(/[a-z]/)) score++;
    if (pw.match(/[0-9]/)) score++;
    if (pw.match(/[^A-Za-z0-9]/)) score++;
    if (pw.length >= 12) score++;

    let percent = (score / 6) * 100;
    let strength = 'Very Weak';
    let color = '#ff4444';
    if (score >= 5) { strength = 'Excellent'; color = '#00ff88'; }
    else if (score >= 4) { strength = 'Good'; color = '#aaff44'; }
    else if (score >= 3) { strength = 'Fair'; color = '#ffaa44'; }
    else if (score >= 2) { strength = 'Weak'; color = '#ff6644'; }
    strengthFill.style.width = percent + '%';
    strengthFill.style.backgroundColor = color;
    strengthText.textContent = strength;
    strengthText.style.color = color;
    return score >= 4;
  }

  passwordInput.addEventListener('input', () => {
    checkStrength(passwordInput.value);
  });

  // Form submission
  const form = document.getElementById('resetForm');
  const messageDiv = document.getElementById('message');

  function showMessage(msg, type) {
    messageDiv.innerHTML = msg;
    messageDiv.className = 'message';
    if (type === 'error') messageDiv.classList.add('error');
    if (type === 'success') messageDiv.classList.add('success');
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const newPassword = passwordInput.value;
    const confirm = document.getElementById('confirmPassword').value;

    if (!checkStrength(newPassword)) {
      showMessage('❌ Password is too weak. Use 8+ chars with uppercase, lowercase, number, special char.', 'error');
      return;
    }
    if (newPassword !== confirm) {
      showMessage('❌ Passwords do not match.', 'error');
      return;
    }

    showMessage('⏳ Updating password...', 'success');

    try {
      const res = await fetch('/api/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, newPassword })
      });
      const data = await res.json();
      if (data.success) {
        showMessage('✅ Password changed successfully! Redirecting to login...', 'success');
        setTimeout(() => window.location.href = '/login.html', 2000);
      } else {
        showMessage('❌ ' + (data.message || 'Invalid or expired token.'), 'error');
      }
    } catch (err) {
      showMessage('❌ Server error. Try again later.', 'error');
    }
  });
</script>
</body>
</html>
