<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>VECTOR CRASHER | Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0a0a1a;
      font-family: 'Rajdhani', sans-serif;
      color: #eee;
      overflow-x: hidden;
      min-height: 100vh;
    }
    #particles-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }
    .scanlines {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(0deg, rgba(0,255,255,0.03) 0px, rgba(0,255,255,0.03) 2px, transparent 2px, transparent 6px);
      pointer-events: none;
      z-index: 3;
    }
    .grid-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: linear-gradient(rgba(0,240,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0,240,255,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 2;
    }
    .cursor-glow {
      position: fixed;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,240,255,0.15), transparent 70%);
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 1;
      transition: transform 0.05s linear;
    }
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 20%, rgba(0,240,255,0.05), rgba(0,0,0,0.7));
      z-index: 1;
      pointer-events: none;
    }
    .container {
      position: relative;
      z-index: 10;
      max-width: 1200px;
      margin: 0 auto;
      padding: 80px 20px 40px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 1s ease-out forwards;
    }
    @keyframes fadeInUp {
      to { opacity: 1; transform: translateY(0); }
    }
    .logo {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 30px;
    }
    .logo-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .logo-left svg {
      width: 55px;
      height: 55px;
      filter: drop-shadow(0 0 8px cyan);
      animation: pulseGlow 2s infinite;
    }
    @keyframes pulseGlow {
      0%,100% { filter: drop-shadow(0 0 4px cyan); }
      50% { filter: drop-shadow(0 0 15px magenta); }
    }
    .logo-text {
      font-family: 'Orbitron', monospace;
      font-size: 1.8rem;
      font-weight: 900;
      background: linear-gradient(135deg, cyan, magenta);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 2px;
    }
    .glass-card {
      background: rgba(10,20,40,0.65);
      backdrop-filter: blur(16px);
      border-radius: 32px;
      padding: 30px;
      border: 1px solid rgba(0,240,255,0.4);
      margin-bottom: 30px;
    }
    h2 {
      font-family: 'Orbitron', monospace;
      font-size: 1.5rem;
      margin-bottom: 20px;
      color: cyan;
      border-left: 4px solid cyan;
      padding-left: 15px;
    }
    .admin-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: rgba(0,0,0,0.5);
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      border: 1px solid rgba(0,240,255,0.2);
    }
    .stat-number {
      font-family: 'Orbitron', monospace;
      font-size: 2rem;
      color: cyan;
    }
    .input-group {
      margin-bottom: 20px;
    }
    .input-group input, .input-group select, .input-group textarea {
      width: 100%;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(0,240,255,0.4);
      padding: 12px 18px;
      border-radius: 30px;
      color: white;
      font-size: 0.95rem;
    }
    .input-group textarea {
      border-radius: 20px;
      resize: vertical;
    }
    .inline-form {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: flex-end;
    }
    .inline-form .input-group {
      flex: 1;
      margin-bottom: 0;
    }
    button {
      background: linear-gradient(135deg, #00f0ff, #aa00ff);
      border: none;
      padding: 12px 24px;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover {
      transform: scale(1.02);
      box-shadow: 0 0 20px cyan;
    }
    .btn-small {
      padding: 6px 15px;
      font-size: 0.8rem;
      margin-left: 8px;
    }
    .btn-danger {
      background: linear-gradient(135deg, #ff0044, #660000);
    }
    .premium-badge {
      background: linear-gradient(135deg, #ffd700, #ffaa00);
      color: #000;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 0.7rem;
      display: inline-block;
      margin-left: 8px;
    }
    .user-list, .channels-list, .groups-list {
      max-height: 400px;
      overflow-y: auto;
    }
    .user-item, .channel-item, .group-item {
      background: rgba(0,0,0,0.3);
      border-radius: 16px;
      padding: 12px 15px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }
    .message {
      margin-top: 15px;
      padding: 10px;
      border-radius: 20px;
      font-size: 0.85rem;
    }
    .error { color: #ff6666; background: rgba(255,0,0,0.1); }
    .success { color: #66ff66; background: rgba(0,255,0,0.1); }
    footer {
      text-align: center;
      margin-top: 30px;
      font-size: 0.7rem;
      opacity: 0.6;
    }
    @media (max-width: 700px) {
      .inline-form { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>
<canvas id="particles-canvas"></canvas>
<div class="scanlines"></div>
<div class="grid-overlay"></div>
<div class="cursor-glow" id="cursorGlow"></div>
<div class="overlay"></div>
<div class="container" id="loginContainer" style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
  <div class="glass-card" style="max-width: 400px;">
    <div style="text-align: center;">
      <svg width="80" height="80" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 10 L70 25 L80 50 L70 75 L50 90 L30 75 L20 50 L30 25 L50 10Z" fill="none" stroke="#00f0ff" stroke-width="2"/>
        <circle cx="38" cy="45" r="3" fill="#ff00ff"/>
        <circle cx="62" cy="45" r="3" fill="#ff00ff"/>
        <path d="M45 60 Q50 68 55 60" stroke="#00f0ff" stroke-width="2" fill="none"/>
        <path d="M50 75 L50 85 M40 80 L50 85 L60 80" stroke="#ff00ff" stroke-width="1.5"/>
      </svg>
      <h1 style="margin: 20px 0;">Admin Login</h1>
    </div>
    <input type="password" id="adminPassword" placeholder="Enter admin password" class="input-group" style="margin-bottom: 20px;">
    <button id="adminLoginBtn">ACCESS PANEL</button>
    <div id="loginMessage" class="message"></div>
  </div>
</div>
<div id="adminContent" style="display: none;">
  <div class="container">
    <div class="logo">
      <div class="logo-left">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M50 10 L70 25 L80 50 L70 75 L50 90 L30 75 L20 50 L30 25 L50 10Z" fill="none" stroke="#00f0ff" stroke-width="2"/>
          <circle cx="38" cy="45" r="3" fill="#ff00ff"/>
          <circle cx="62" cy="45" r="3" fill="#ff00ff"/>
          <path d="M45 60 Q50 68 55 60" stroke="#00f0ff" stroke-width="2" fill="none"/>
          <path d="M50 75 L50 85 M40 80 L50 85 L60 80" stroke="#ff00ff" stroke-width="1.5"/>
        </svg>
        <span class="logo-text">ADMIN PANEL</span>
      </div>
      <button id="adminLogoutBtn" class="btn-small" style="background: #ff4444;">Logout</button>
    </div>

    <!-- Stats -->
    <div class="admin-grid" id="statsContainer"></div>

    <!-- User Management -->
    <div class="glass-card">
      <h2><i class="fas fa-users"></i> User Management</h2>
      <div class="user-list" id="userList"></div>
      <div class="inline-form" style="margin-top:20px;">
        <div class="input-group"><input type="email" id="newEmail" placeholder="Email (Gmail)"></div>
        <div class="input-group"><input type="tel" id="newPhone" placeholder="Phone"></div>
        <div class="input-group"><input type="number" id="newAge" placeholder="Age"></div>
        <div class="input-group"><input type="password" id="newPassword" placeholder="Password"></div>
        <button id="createUserBtn">Create User</button>
      </div>
      <div id="createUserMessage" class="message"></div>
    </div>

    <!-- Broadcast -->
    <div class="glass-card">
      <h2><i class="fas fa-broadcast-tower"></i> Broadcast Message</h2>
      <div class="input-group">
        <textarea id="broadcastMessage" rows="3" placeholder="Enter message to send to ALL users..."></textarea>
      </div>
      <div class="input-group">
        <select id="broadcastTarget">
          <option value="all">All Users</option>
          <option value="approved">Approved Users Only</option>
          <option value="premium">Premium Users Only</option>
        </select>
      </div>
      <button id="sendBroadcastBtn"><i class="fas fa-paper-plane"></i> Send Broadcast</button>
      <div id="broadcastMessageDiv" class="message"></div>
    </div>

    <!-- Channels (Admin only) -->
    <div class="glass-card">
      <h2><i class="fas fa-newspaper"></i> Channels (Admin Only)</h2>
      <div class="inline-form" style="margin-bottom:15px;">
        <div class="input-group"><input type="text" id="newChannelName" placeholder="Channel name"></div>
        <div class="input-group"><input type="text" id="newChannelDesc" placeholder="Description"></div>
        <button id="createChannelBtn">Create Channel</button>
      </div>
      <div id="channelsList" class="channels-list"></div>
    </div>

    <!-- Groups (Admin can create premium groups) -->
    <div class="glass-card">
      <h2><i class="fas fa-users"></i> Groups</h2>
      <div class="inline-form" style="margin-bottom:15px;">
        <div class="input-group"><input type="text" id="newGroupName" placeholder="Group name"></div>
        <div class="input-group">
          <select id="groupType">
            <option value="normal">Normal Group</option>
            <option value="premium">Premium Group (admin-created, premium badge)</option>
          </select>
        </div>
        <button id="createGroupBtn">Create Group</button>
      </div>
      <div id="groupsList" class="groups-list"></div>
    </div>

    <footer>© 2026 VECTOR CRASHER — ZENTRIX TECH</footer>
  </div>
</div>
<script>
  let adminToken = null;

  // Particles and effects (same as before)
  const cursorGlow = document.getElementById('cursorGlow');
  document.addEventListener('mousemove', (e) => cursorGlow.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`);
  const canvas = document.getElementById('particles-canvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  function createParticles() {
    const count = 120;
    for (let i=0; i<count; i++) particles.push({
      x: Math.random()*canvas.width, y: Math.random()*canvas.height, radius: Math.random()*2.5+1,
      speedX: (Math.random()-0.5)*0.8, speedY: (Math.random()-0.5)*0.6,
      color: `rgba(0, ${Math.floor(150+Math.random()*105)}, 255, ${Math.random()*0.6+0.2})`
    });
  }
  function drawParticles() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for (let p of particles) {
      ctx.beginPath(); ctx.arc(p.x,p.y,p.radius,0,Math.PI*2); ctx.fillStyle = p.color; ctx.fill();
      p.x += p.speedX; p.y += p.speedY;
      if (p.x<0) p.x = canvas.width; if (p.x>canvas.width) p.x=0;
      if (p.y<0) p.y = canvas.height; if (p.y>canvas.height) p.y=0;
    }
    requestAnimationFrame(drawParticles);
  }
  window.addEventListener('resize', () => { resizeCanvas(); particles = []; createParticles(); });
  resizeCanvas(); createParticles(); drawParticles();

  // Admin login handling
  document.getElementById('adminLoginBtn').addEventListener('click', async () => {
    const password = document.getElementById('adminPassword').value;
    const msgDiv = document.getElementById('loginMessage');
    if (!password) { msgDiv.innerHTML = '❌ Enter password'; msgDiv.className = 'message error'; return; }
    try {
      const res = await fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password })
      });
      const data = await res.json();
      if (data.success && data.token) {
        adminToken = data.token;
        sessionStorage.setItem('adminToken', adminToken);
        document.getElementById('loginContainer').style.display = 'none';
        document.getElementById('adminContent').style.display = 'block';
        loadStats();
        loadUsers();
        loadChannels();
        loadGroups();
      } else {
        msgDiv.innerHTML = '❌ ' + (data.message || 'Invalid password');
        msgDiv.className = 'message error';
      }
    } catch (err) {
      msgDiv.innerHTML = '❌ Server error';
      msgDiv.className = 'message error';
    }
  });

  if (sessionStorage.getItem('adminToken')) {
    adminToken = sessionStorage.getItem('adminToken');
    document.getElementById('loginContainer').style.display = 'none';
    document.getElementById('adminContent').style.display = 'block';
    loadStats();
    loadUsers();
    loadChannels();
    loadGroups();
  }

  document.getElementById('adminLogoutBtn')?.addEventListener('click', () => {
    sessionStorage.removeItem('adminToken');
    location.reload();
  });

  async function apiRequest(endpoint, method, body = null) {
    const opts = { method, headers: { 'Authorization': `Bearer ${adminToken}`, 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(endpoint, opts);
    return res.json();
  }

  async function loadStats() {
    const data = await apiRequest('/api/admin/stats', 'GET');
    if (data.success) {
      document.getElementById('statsContainer').innerHTML = `
        <div class="stat-card"><div class="stat-number">${data.totalUsers}</div><div>Total Users</div></div>
        <div class="stat-card"><div class="stat-number">${data.approvedUsers}</div><div>Approved</div></div>
        <div class="stat-card"><div class="stat-number">${data.premiumUsers}</div><div>Premium Users</div></div>
        <div class="stat-card"><div class="stat-number">${data.connectedDevices}</div><div>Connected Devices</div></div>
      `;
    }
  }

  async function loadUsers() {
    const data = await apiRequest('/api/admin/users', 'GET');
    if (data.success && data.users) {
      const container = document.getElementById('userList');
      container.innerHTML = data.users.map(user => `
        <div class="user-item">
          <div class="user-info">
            <strong>${escapeHtml(user.email)}</strong> ${user.approved ? '<span style="color:#0f0;">✓ Approved</span>' : '<span style="color:#fa0;">⏳ Pending</span>'}
            ${user.premium ? '<span class="premium-badge">PREMIUM</span>' : ''}
            <div style="font-size:0.7rem;">${user.phone || ''} | Age: ${user.age || '?'}</div>
          </div>
          <div>
            ${!user.approved ? `<button class="btn-small" onclick="approveUser('${user.id}')">Approve</button>` : ''}
            ${!user.premium ? `<button class="btn-small" onclick="togglePremium('${user.id}', true)">Set Premium</button>` : `<button class="btn-small" onclick="togglePremium('${user.id}', false)">Remove Premium</button>`}
            <button class="btn-small btn-danger" onclick="deleteUser('${user.id}')">Delete</button>
          </div>
        </div>
      `).join('');
    }
  }

  window.approveUser = async (userId) => {
    await apiRequest('/api/admin/approve-user', 'POST', { userId });
    loadUsers(); loadStats();
  };
  window.togglePremium = async (userId, premium) => {
    await apiRequest('/api/admin/update-tier', 'POST', { userId, tier: premium ? 'premium' : 'lite' });
    loadUsers(); loadStats();
  };
  window.deleteUser = async (userId) => {
    if (!confirm('Delete user permanently?')) return;
    await apiRequest('/api/admin/delete-user', 'POST', { userId });
    loadUsers(); loadStats();
  };

  document.getElementById('createUserBtn')?.addEventListener('click', async () => {
    const email = document.getElementById('newEmail').value.trim();
    const phone = document.getElementById('newPhone').value.trim();
    const age = parseInt(document.getElementById('newAge').value);
    const password = document.getElementById('newPassword').value;
    if (!email || !phone || !age || !password) {
      document.getElementById('createUserMessage').innerHTML = '❌ All fields required';
      return;
    }
    const res = await apiRequest('/api/admin/create-user', 'POST', { email, phone, age, password });
    const msgDiv = document.getElementById('createUserMessage');
    if (res.success) {
      msgDiv.innerHTML = '✅ User created!';
      msgDiv.className = 'message success';
      loadUsers(); loadStats();
      document.getElementById('newEmail').value = '';
      document.getElementById('newPhone').value = '';
      document.getElementById('newAge').value = '';
      document.getElementById('newPassword').value = '';
    } else {
      msgDiv.innerHTML = '❌ ' + (res.message || 'Creation failed');
      msgDiv.className = 'message error';
    }
    setTimeout(() => msgDiv.innerHTML = '', 3000);
  });

  // Broadcast
  document.getElementById('sendBroadcastBtn')?.addEventListener('click', async () => {
    const message = document.getElementById('broadcastMessage').value.trim();
    const target = document.getElementById('broadcastTarget').value;
    if (!message) {
      document.getElementById('broadcastMessageDiv').innerHTML = '❌ Message required';
      return;
    }
    const res = await apiRequest('/api/admin/broadcast', 'POST', { message, target });
    const msgDiv = document.getElementById('broadcastMessageDiv');
    if (res.success) {
      msgDiv.innerHTML = `✅ Broadcast sent to ${res.count} users`;
      msgDiv.className = 'message success';
      document.getElementById('broadcastMessage').value = '';
    } else {
      msgDiv.innerHTML = '❌ ' + (res.message || 'Failed');
      msgDiv.className = 'message error';
    }
    setTimeout(() => msgDiv.innerHTML = '', 4000);
  });

  // Channels
  async function loadChannels() {
    const data = await apiRequest('/api/channels', 'GET');
    if (data.success) {
      const container = document.getElementById('channelsList');
      container.innerHTML = data.channels.map(ch => `
        <div class="channel-item">
          <div><strong>${escapeHtml(ch.name)}</strong><br>${escapeHtml(ch.description)}</div>
          <button class="btn-small btn-danger" onclick="deleteChannel('${ch.id}')">Delete</button>
        </div>
      `).join('');
    }
  }
  window.deleteChannel = async (channelId) => {
    if (!confirm('Delete channel?')) return;
    await apiRequest('/api/admin/delete-channel', 'POST', { channelId });
    loadChannels();
  };
  document.getElementById('createChannelBtn')?.addEventListener('click', async () => {
    const name = document.getElementById('newChannelName').value.trim();
    const desc = document.getElementById('newChannelDesc').value.trim();
    if (!name) return;
    await apiRequest('/api/admin/create-channel', 'POST', { name, description: desc });
    loadChannels();
    document.getElementById('newChannelName').value = '';
    document.getElementById('newChannelDesc').value = '';
  });

  // Groups
  async function loadGroups() {
    const data = await apiRequest('/api/groups', 'GET');
    if (data.success) {
      const container = document.getElementById('groupsList');
      container.innerHTML = data.groups.map(g => `
        <div class="group-item">
          <div><strong>${escapeHtml(g.name)}</strong> ${g.premium ? '<span class="premium-badge">PREMIUM</span>' : ''}<br>Members: ${g.membersCount || 0}</div>
          <div>
            <button class="btn-small" onclick="deleteGroup('${g.id}')">Delete</button>
          </div>
        </div>
      `).join('');
    }
  }
  window.deleteGroup = async (groupId) => {
    if (!confirm('Delete group?')) return;
    await apiRequest('/api/admin/delete-group', 'POST', { groupId });
    loadGroups();
  };
  document.getElementById('createGroupBtn')?.addEventListener('click', async () => {
    const name = document.getElementById('newGroupName').value.trim();
    const type = document.getElementById('groupType').value;
    if (!name) return;
    const premium = type === 'premium';
    await apiRequest('/api/admin/create-group', 'POST', { name, premium });
    loadGroups();
    document.getElementById('newGroupName').value = '';
  });

  function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
</script>
</body>
</html>
