<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>VECTOR CRASHER | Ban Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      font-family: 'Rajdhani', sans-serif;
      color: #eee;
      overflow-x: hidden;
      min-height: 100vh;
    }
    #particles-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }
    .scanlines {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(0deg, rgba(0,255,255,0.03) 0px, rgba(0,255,255,0.03) 2px, transparent 2px, transparent 6px);
      pointer-events: none;
      z-index: 3;
    }
    .grid-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: linear-gradient(rgba(0,240,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0,240,255,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 2;
    }
    .cursor-glow {
      position: fixed;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,240,255,0.15), transparent 70%);
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 1;
      transition: transform 0.05s linear;
    }
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 20%, rgba(0,240,255,0.05), rgba(0,0,0,0.7));
      z-index: 1;
      pointer-events: none;
    }
    .hamburger {
      position: fixed;
      top: 25px;
      left: 25px;
      width: 45px;
      height: 45px;
      background: rgba(10,20,40,0.9);
      border: 1px solid cyan;
      border-radius: 12px;
      cursor: pointer;
      z-index: 1001;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 6px;
      backdrop-filter: blur(8px);
    }
    .hamburger:hover { background: cyan; box-shadow: 0 0 15px cyan; }
    .hamburger span { width: 25px; height: 3px; background: cyan; transition: 0.2s; }
    .hamburger:hover span { background: #000; }
    .sidebar {
      position: fixed;
      top: 0;
      left: -280px;
      width: 280px;
      height: 100%;
      background: rgba(5,10,20,0.95);
      backdrop-filter: blur(20px);
      border-right: 2px solid cyan;
      z-index: 1000;
      transition: left 0.3s cubic-bezier(0.2,0.9,0.4,1.1);
      padding-top: 80px;
    }
    .sidebar.open { left: 0; }
    .sidebar a {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 15px 25px;
      color: #ccc;
      text-decoration: none;
      font-weight: 500;
      border-bottom: 1px solid rgba(0,240,255,0.1);
      transition: 0.2s;
    }
    .sidebar a i { width: 25px; color: cyan; }
    .sidebar a:hover { background: rgba(0,240,255,0.1); padding-left: 35px; color: white; }
    .container {
      position: relative;
      z-index: 10;
      max-width: 1400px;
      margin: 0 auto;
      padding: 100px 20px 60px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 1s ease-out forwards;
    }
    @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
    .logo {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 40px;
    }
    .logo-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .logo-left svg {
      width: 55px;
      height: 55px;
      filter: drop-shadow(0 0 8px cyan);
      animation: pulseGlow 2s infinite;
    }
    @keyframes pulseGlow {
      0%,100% { filter: drop-shadow(0 0 4px cyan); }
      50% { filter: drop-shadow(0 0 15px magenta); }
    }
    .logo-text {
      font-family: 'Orbitron', monospace;
      font-size: 1.8rem;
      font-weight: 900;
      background: linear-gradient(135deg, cyan, magenta);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 2px;
    }
    .device-status {
      background: rgba(0,0,0,0.5);
      padding: 8px 20px;
      border-radius: 40px;
      border: 1px solid cyan;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .premium-badge {
      background: linear-gradient(135deg, #ffd700, #ffaa00);
      color: #000;
      padding: 2px 12px;
      border-radius: 20px;
      font-weight: bold;
      margin-left: 8px;
    }
    .free-badge {
      background: #333;
      color: #ccc;
      padding: 2px 12px;
      border-radius: 20px;
      font-weight: normal;
    }
    h1 {
      font-family: 'Orbitron', monospace;
      font-size: 2rem;
      margin-bottom: 30px;
      color: cyan;
      text-align: center;
    }
    .category {
      margin-bottom: 40px;
    }
    .category-title {
      font-size: 1.6rem;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid cyan;
      display: inline-block;
    }
    .bugs-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 25px;
    }
    .bug-card {
      background: rgba(10,20,40,0.6);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      border: 1px solid rgba(0,240,255,0.3);
      padding: 20px;
      transition: 0.3s;
    }
    .bug-card:hover {
      transform: translateY(-5px);
      border-color: cyan;
      box-shadow: 0 0 20px rgba(0,240,255,0.2);
    }
    .bug-header {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }
    .bug-header i {
      font-size: 2rem;
      color: cyan;
    }
    .bug-header h3 {
      font-size: 1.3rem;
      font-family: 'Orbitron', monospace;
    }
    .bug-description {
      font-size: 0.85rem;
      color: #bbb;
      margin-bottom: 15px;
      line-height: 1.4;
    }
    .bug-target {
      margin-bottom: 15px;
    }
    .bug-target input {
      width: 100%;
      background: rgba(0,0,0,0.6);
      border: 1px solid rgba(0,240,255,0.4);
      padding: 10px 15px;
      border-radius: 30px;
      color: white;
      font-size: 0.85rem;
    }
    .bug-target input:focus {
      outline: none;
      border-color: cyan;
    }
    .launch-btn {
      width: 100%;
      background: linear-gradient(135deg, #ff0044, #aa00ff);
      border: none;
      padding: 10px;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .launch-btn:hover:not(:disabled) {
      transform: scale(1.02);
      box-shadow: 0 0 15px #ff0044;
    }
    .launch-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .whatsapp-float {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #25D366;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: white;
      box-shadow: 0 0 20px rgba(37,211,102,0.6);
      transition: 0.3s;
      z-index: 20;
      animation: pulseWhatsApp 1.5s infinite;
      text-decoration: none;
    }
    .whatsapp-float:hover { transform: scale(1.1); box-shadow: 0 0 35px #25D366; }
    @keyframes pulseWhatsApp {
      0% { box-shadow: 0 0 0 0 rgba(37,211,102,0.7); }
      70% { box-shadow: 0 0 0 15px rgba(37,211,102,0); }
      100% { box-shadow: 0 0 0 0 rgba(37,211,102,0); }
    }
    footer {
      text-align: center;
      margin-top: 60px;
      font-size: 0.7rem;
      opacity: 0.6;
    }
    @media (max-width: 700px) {
      .container { padding: 80px 16px 40px; }
      .logo-left svg { width: 40px; height: 40px; }
      .logo-text { font-size: 1.3rem; }
      .bugs-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<canvas id="particles-canvas"></canvas>
<div class="scanlines"></div>
<div class="grid-overlay"></div>
<div class="cursor-glow" id="cursorGlow"></div>
<div class="overlay"></div>
<div class="hamburger" onclick="toggleSidebar()">
  <span></span><span></span><span></span>
</div>
<div class="sidebar" id="sidebar">
  <a href="/dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
  <a href="/connect.html"><i class="fab fa-whatsapp"></i> Connect Device</a>
  <a href="/ban.html"><i class="fas fa-skull"></i> Ban Panel</a>
  <a href="/unban.html"><i class="fas fa-infinity"></i> Unban Panel</a>
  <a href="/account.html"><i class="fas fa-user-cog"></i> Account</a>
  <a href="/developers.html"><i class="fas fa-code"></i> Developers / Support</a>
  <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>
<div class="container">
  <div class="logo">
    <div class="logo-left">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 10 L70 25 L80 50 L70 75 L50 90 L30 75 L20 50 L30 25 L50 10Z" fill="none" stroke="#00f0ff" stroke-width="2"/>
        <circle cx="38" cy="45" r="3" fill="#ff00ff"/>
        <circle cx="62" cy="45" r="3" fill="#ff00ff"/>
        <path d="M45 60 Q50 68 55 60" stroke="#00f0ff" stroke-width="2" fill="none"/>
        <path d="M50 75 L50 85 M40 80 L50 85 L60 80" stroke="#ff00ff" stroke-width="1.5"/>
      </svg>
      <span class="logo-text">BAN PANEL</span>
    </div>
    <div class="device-status" id="deviceStatus">
      <i class="fas fa-circle" style="color: #ff4444;"></i> No Device Connected
    </div>
  </div>
  <div style="text-align: center; margin-bottom: 20px;">
    <span id="userTypeBadge" style="background: #333; padding: 5px 20px; border-radius: 30px;">Loading...</span>
  </div>
  <h1><i class="fas fa-skull"></i> SELECT YOUR WEAPON</h1>
  <div id="bugsContainer"></div>
  <footer>© 2026 VECTOR CRASHER — ZENTRIX TECH</footer>
</div>
<a href="https://whatsapp.com/channel/0029VbD1fqe5kg6xDhBs5G3M" target="_blank" class="whatsapp-float">
  <i class="fab fa-whatsapp"></i>
</a>
<script>
  const token = localStorage.getItem('authToken') || sessionStorage.getItem('authToken');
  if (!token) window.location.href = '/login.html';
  let userPremium = false;
  let activeBugs = [];
  function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
  async function logout() {
    await fetch('/api/logout', { method: 'POST' });
    localStorage.removeItem('authToken'); sessionStorage.removeItem('authToken');
    window.location.href = '/login.html';
  }
  // Mouse & particles (same as before)
  const cursorGlow = document.getElementById('cursorGlow');
  document.addEventListener('mousemove', (e) => cursorGlow.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`);
  const canvas = document.getElementById('particles-canvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  function createParticles() {
    const particleCount = 120;
    for (let i=0; i<particleCount; i++) particles.push({
      x: Math.random()*canvas.width, y: Math.random()*canvas.height, radius: Math.random()*2.5+1,
      speedX: (Math.random()-0.5)*0.8, speedY: (Math.random()-0.5)*0.6,
      color: `rgba(0, ${Math.floor(150+Math.random()*105)}, 255, ${Math.random()*0.6+0.2})`
    });
  }
  function drawParticles() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for (let p of particles) {
      ctx.beginPath(); ctx.arc(p.x,p.y,p.radius,0,Math.PI*2); ctx.fillStyle = p.color; ctx.fill();
      p.x += p.speedX; p.y += p.speedY;
      if (p.x<0) p.x = canvas.width; if (p.x>canvas.width) p.x=0;
      if (p.y<0) p.y = canvas.height; if (p.y>canvas.height) p.y=0;
    }
    requestAnimationFrame(drawParticles);
  }
  window.addEventListener('resize', () => { resizeCanvas(); particles = []; createParticles(); });
  resizeCanvas(); createParticles(); drawParticles();

  async function fetchUserPremium() {
    try {
      const res = await fetch('/api/user/status', { headers: { 'Authorization': `Bearer ${token}` } });
      const data = await res.json();
      if (data.success) {
        userPremium = data.premium;
        const badge = document.getElementById('userTypeBadge');
        if (userPremium) {
          badge.innerHTML = '<i class="fas fa-crown"></i> PREMIUM USER <span class="premium-badge" style="background:gold; color:#000;">Unlimited Bugs</span>';
          badge.style.background = 'linear-gradient(135deg, #ffd70022, #ffaa0022)';
        } else {
          badge.innerHTML = '<i class="fas fa-user"></i> FREE USER <span class="free-badge">Premium bugs require upgrade</span>';
        }
      }
    } catch(e) { console.error(e); }
  }
  async function updateDeviceStatus() {
    try {
      const res = await fetch('/api/user/device-status', { headers: { 'Authorization': `Bearer ${token}` } });
      const data = await res.json();
      const statusDiv = document.getElementById('deviceStatus');
      if (data.connected) statusDiv.innerHTML = `<i class="fas fa-circle" style="color:#00ff88;"></i> Connected: ${data.phoneNumber || 'WhatsApp Device'}`;
      else statusDiv.innerHTML = `<i class="fas fa-circle" style="color:#ff4444;"></i> No Device Connected`;
    } catch(e) { console.error(e); }
  }
  async function loadBugs() {
    try {
      const res = await fetch('/api/bugs', { headers: { 'Authorization': `Bearer ${token}` } });
      const data = await res.json();
      if (data.success && data.bugs) {
        activeBugs = data.bugs;
        renderBugs(activeBugs);
      } else document.getElementById('bugsContainer').innerHTML = '<p style="text-align:center;">No bugs available. Contact admin.</p>';
    } catch(e) { console.error(e); }
  }
  function renderBugs(bugs) {
    const container = document.getElementById('bugsContainer');
    container.innerHTML = '';
    const categories = {};
    bugs.forEach(bug => { if (!categories[bug.category]) categories[bug.category] = []; categories[bug.category].push(bug); });
    for (const [cat, bugList] of Object.entries(categories)) {
      const catDiv = document.createElement('div'); catDiv.className = 'category';
      catDiv.innerHTML = `<div class="category-title"><i class="fas fa-tag"></i> ${cat.toUpperCase()}</div><div class="bugs-grid" id="grid-${cat}"></div>`;
      container.appendChild(catDiv);
      const grid = catDiv.querySelector(`.bugs-grid`);
      bugList.forEach(bug => {
        const isPremiumBug = bug.premiumOnly === true;
        const canUse = !isPremiumBug || userPremium;
        const card = document.createElement('div'); card.className = 'bug-card';
        const badgeHtml = isPremiumBug ? '<span class="premium-badge"><i class="fas fa-lock"></i> PREMIUM</span>' : '<span class="free-badge"><i class="fas fa-check-circle"></i> FREE</span>';
        card.innerHTML = `
          <div class="bug-header">
            <i class="${bug.icon || 'fas fa-bug'}"></i>
            <h3>${escapeHtml(bug.name)} ${badgeHtml}</h3>
          </div>
          <div class="bug-description">${escapeHtml(bug.description)}</div>
          <div class="bug-target">
            <input type="text" id="target-${bug.id}" placeholder="${escapeHtml(bug.targetPlaceholder || 'Target (JID or phone number)')}" ${!canUse ? 'disabled' : ''}>
          </div>
          <button class="launch-btn" data-id="${bug.id}" ${!canUse ? 'disabled' : ''}>
            <i class="fas fa-skull"></i> LAUNCH ${escapeHtml(bug.name)}
          </button>
          ${!canUse && isPremiumBug ? '<div style="font-size:0.7rem; color:#ffaa44; margin-top:8px;"><i class="fas fa-gem"></i> Upgrade to Premium to use this bug</div>' : ''}
        `;
        grid.appendChild(card);
      });
    }
    document.querySelectorAll('.launch-btn').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        const bugId = btn.getAttribute('data-id');
        const bug = activeBugs.find(b => b.id == bugId);
        if (!bug) return;
        if (bug.premiumOnly && !userPremium) {
          alert('⛔ This bug is for Premium users only. Upgrade from your account settings.');
          return;
        }
        const targetInput = document.getElementById(`target-${bugId}`);
        const target = targetInput.value.trim();
        if (!target) { alert('Please enter a target'); return; }
        btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> EXECUTING...';
        try {
          const res = await fetch('/api/bugs/execute', {
            method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({ bugId: bug.id, target })
          });
          const data = await res.json();
          if (data.success) alert(`✅ ${bug.name} executed on ${target}\n${data.message || ''}`);
          else alert(`❌ Failed: ${data.message || 'Unknown error'}`);
        } catch(err) { alert(`❌ Execution error: ${err.message}`); }
        finally { btn.disabled = false; btn.innerHTML = `<i class="fas fa-skull"></i> LAUNCH ${bug.name}`; }
      });
    });
  }
  function escapeHtml(str) { return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
  fetchUserPremium();
  updateDeviceStatus();
  loadBugs();
  setInterval(updateDeviceStatus, 10000);
</script>
</body>
</html>
