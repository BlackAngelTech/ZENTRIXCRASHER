<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>VECTOR CRASHER | Account Settings</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* same base styles as previous account.html – you can keep your original CSS */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a1a; font-family: 'Rajdhani', sans-serif; color: #eee; overflow-x: hidden; min-height: 100vh; }
    #particles-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
    .scanlines { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: repeating-linear-gradient(0deg, rgba(0,255,255,0.03) 0px, rgba(0,255,255,0.03) 2px, transparent 2px, transparent 6px); pointer-events: none; z-index: 3; }
    .grid-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(0,240,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0,240,255,0.05) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 2; }
    .cursor-glow { position: fixed; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(0,240,255,0.15), transparent 70%); pointer-events: none; transform: translate(-50%, -50%); z-index: 1; transition: transform 0.05s linear; }
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 30% 20%, rgba(0,240,255,0.05), rgba(0,0,0,0.7)); z-index: 1; pointer-events: none; }
    .hamburger { position: fixed; top: 25px; left: 25px; width: 45px; height: 45px; background: rgba(10,20,40,0.9); border: 1px solid cyan; border-radius: 12px; cursor: pointer; z-index: 1001; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 6px; backdrop-filter: blur(8px); transition: 0.2s; }
    .hamburger:hover { background: cyan; box-shadow: 0 0 15px cyan; }
    .hamburger span { width: 25px; height: 3px; background: cyan; transition: 0.2s; }
    .hamburger:hover span { background: #000; }
    .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: rgba(5,10,20,0.95); backdrop-filter: blur(20px); border-right: 2px solid cyan; z-index: 1000; transition: left 0.3s cubic-bezier(0.2,0.9,0.4,1.1); padding-top: 80px; }
    .sidebar.open { left: 0; }
    .sidebar a { display: flex; align-items: center; gap: 15px; padding: 15px 25px; color: #ccc; text-decoration: none; font-weight: 500; border-bottom: 1px solid rgba(0,240,255,0.1); transition: 0.2s; }
    .sidebar a i { width: 25px; color: cyan; }
    .sidebar a:hover { background: rgba(0,240,255,0.1); padding-left: 35px; color: white; }
    .container { position: relative; z-index: 10; max-width: 900px; margin: 0 auto; padding: 100px 20px 60px; opacity: 0; transform: translateY(20px); animation: fadeInUp 1s ease-out forwards; }
    @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
    .logo { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 20px; margin-bottom: 40px; }
    .logo-left { display: flex; align-items: center; gap: 15px; }
    .logo-left svg { width: 55px; height: 55px; filter: drop-shadow(0 0 8px cyan); animation: pulseGlow 2s infinite; }
    @keyframes pulseGlow { 0%,100% { filter: drop-shadow(0 0 4px cyan); } 50% { filter: drop-shadow(0 0 15px magenta); } }
    .logo-text { font-family: 'Orbitron', monospace; font-size: 1.8rem; font-weight: 900; background: linear-gradient(135deg, cyan, magenta); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: 2px; }
    .glass-card { background: rgba(10,20,40,0.65); backdrop-filter: blur(16px); border-radius: 32px; padding: 30px; border: 1px solid rgba(0,240,255,0.4); margin-bottom: 30px; }
    h2 { font-family: 'Orbitron', monospace; font-size: 1.5rem; margin-bottom: 20px; color: cyan; border-left: 4px solid cyan; padding-left: 15px; }
    .avatar-section { display: flex; flex-direction: column; align-items: center; margin-bottom: 25px; }
    .avatar-preview { width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(135deg, cyan, magenta); display: flex; align-items: center; justify-content: center; overflow: hidden; cursor: pointer; margin-bottom: 15px; border: 2px solid cyan; }
    .avatar-preview img { width: 100%; height: 100%; object-fit: cover; }
    .avatar-preview i { font-size: 3rem; color: #000; }
    .avatar-file { display: none; }
    .form-row { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; align-items: center; }
    .form-row label { width: 130px; font-weight: 600; color: cyan; }
    .form-row input, .form-row select { flex: 1; background: rgba(0,0,0,0.6); border: 1px solid rgba(0,240,255,0.4); padding: 12px 15px; border-radius: 30px; color: white; font-size: 0.9rem; }
    .form-row input:focus, .form-row select:focus { outline: none; border-color: cyan; box-shadow: 0 0 8px cyan; }
    button { background: linear-gradient(135deg, #00f0ff, #aa00ff); border: none; padding: 12px 24px; border-radius: 40px; font-weight: bold; cursor: pointer; transition: 0.2s; margin-right: 15px; margin-top: 10px; }
    button:hover { transform: scale(1.02); box-shadow: 0 0 20px cyan; }
    .btn-delete { background: linear-gradient(135deg, #ff0044, #660000); }
    .btn-delete:hover { box-shadow: 0 0 20px #ff0044; }
    .message { margin-top: 15px; padding: 10px; border-radius: 20px; font-size: 0.85rem; }
    .error { color: #ff6666; background: rgba(255,0,0,0.1); }
    .success { color: #66ff66; background: rgba(0,255,0,0.1); }
    .info { color: cyan; background: rgba(0,240,255,0.1); }
    .premium-badge { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #000; padding: 4px 12px; border-radius: 20px; font-weight: bold; display: inline-block; }
    .lite-badge { background: #333; color: #ccc; padding: 4px 12px; border-radius: 20px; }
    .whatsapp-float { position: fixed; bottom: 30px; right: 30px; background: #25D366; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: white; box-shadow: 0 0 20px rgba(37,211,102,0.6); transition: 0.3s; z-index: 20; animation: pulseWhatsApp 1.5s infinite; text-decoration: none; }
    .whatsapp-float:hover { transform: scale(1.1); box-shadow: 0 0 35px #25D366; }
    @keyframes pulseWhatsApp { 0% { box-shadow: 0 0 0 0 rgba(37,211,102,0.7); } 70% { box-shadow: 0 0 0 15px rgba(37,211,102,0); } 100% { box-shadow: 0 0 0 0 rgba(37,211,102,0); } }
    footer { text-align: center; margin-top: 30px; font-size: 0.7rem; opacity: 0.6; }
    @media (max-width: 700px) { .container { padding: 80px 16px 40px; } .logo-left svg { width: 40px; height: 40px; } .logo-text { font-size: 1.3rem; } .form-row { flex-direction: column; align-items: stretch; } .form-row label { width: auto; margin-bottom: 5px; } }
  </style>
</head>
<body>
<canvas id="particles-canvas"></canvas>
<div class="scanlines"></div>
<div class="grid-overlay"></div>
<div class="cursor-glow" id="cursorGlow"></div>
<div class="overlay"></div>
<div class="hamburger" onclick="toggleSidebar()">
  <span></span><span></span><span></span>
</div>
<div class="sidebar" id="sidebar">
  <a href="/dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
  <a href="/connect.html"><i class="fab fa-whatsapp"></i> Connect Device</a>
  <a href="/ban.html"><i class="fas fa-skull"></i> Ban Panel</a>
  <a href="/unban.html"><i class="fas fa-infinity"></i> Unban Panel</a>
  <a href="/media.html"><i class="fas fa-photo-video"></i> Media Hub</a>
  <a href="/chatroom.html"><i class="fas fa-comments"></i> Chatroom</a>
  <a href="/api.html"><i class="fas fa-code"></i> API Docs</a>
  <a href="/account.html"><i class="fas fa-user-cog"></i> Account</a>
  <a href="/developers.html"><i class="fas fa-code-branch"></i> Developers / Support</a>
  <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>
<div class="container">
  <div class="logo">
    <div class="logo-left">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 10 L70 25 L80 50 L70 75 L50 90 L30 75 L20 50 L30 25 L50 10Z" fill="none" stroke="#00f0ff" stroke-width="2"/>
        <circle cx="38" cy="45" r="3" fill="#ff00ff"/>
        <circle cx="62" cy="45" r="3" fill="#ff00ff"/>
        <path d="M45 60 Q50 68 55 60" stroke="#00f0ff" stroke-width="2" fill="none"/>
        <path d="M50 75 L50 85 M40 80 L50 85 L60 80" stroke="#ff00ff" stroke-width="1.5"/>
      </svg>
      <span class="logo-text">ACCOUNT SETTINGS</span>
    </div>
  </div>

  <!-- Profile Section -->
  <div class="glass-card">
    <h2><i class="fas fa-user-circle"></i> Profile Information</h2>
    <div class="avatar-section">
      <div class="avatar-preview" id="avatarPreview" onclick="document.getElementById('avatarInput').click()">
        <i class="fas fa-user-secret"></i>
      </div>
      <span>Click avatar to change profile picture</span>
      <input type="file" id="avatarInput" accept="image/*" class="avatar-file">
    </div>
    <div class="form-row"><label>Email:</label><input type="email" id="email" disabled></div>
    <div class="form-row"><label>Age:</label><input type="number" id="age" min="13" max="100"></div>
    <div class="form-row"><label>Gender:</label><select id="gender"><option value="Male">Male</option><option value="Female">Female</option><option value="Other">Other</option></select></div>
    <div class="form-row"><label>Country:</label><input type="text" id="country" placeholder="Your country"></div>
    <div class="form-row"><label>Phone Number:</label><input type="tel" id="phone" placeholder="+1234567890"></div>
    <div class="form-row"><label>Tier:</label><span id="tierDisplay">Lite</span></div>
    <div class="form-row"><label>Account Expires:</label><span id="expiresDisplay">--</span></div>
    <div><button id="saveProfileBtn"><i class="fas fa-save"></i> Save Changes</button></div>
    <div id="profileMessage" class="message"></div>
  </div>

  <!-- Change Password Section -->
  <div class="glass-card">
    <h2><i class="fas fa-lock"></i> Change Password</h2>
    <div class="form-row"><label>Current Password:</label><input type="password" id="oldPassword" placeholder="Required"></div>
    <div class="form-row"><label>New Password:</label><input type="password" id="newPassword" placeholder="Min 8 chars, strong"></div>
    <div class="form-row"><label>Confirm Password:</label><input type="password" id="confirmPassword" placeholder="Retype new password"></div>
    <div id="passwordStrength" style="font-size:0.7rem; margin:10px 0; display:flex; gap:10px; align-items:center;">
      <span>Strength:</span>
      <div style="flex:1; height:4px; background:#333; border-radius:4px; overflow:hidden;"><div id="strengthFill" style="width:0%; height:100%; transition:width 0.2s;"></div></div>
      <span id="strengthText" style="min-width:80px;">Very Weak</span>
    </div>
    <div><button id="changePasswordBtn"><i class="fas fa-key"></i> Update Password</button></div>
    <div id="passwordMessage" class="message"></div>
  </div>

  <!-- Danger Zone -->
  <div class="glass-card">
    <h2><i class="fas fa-exclamation-triangle"></i> Danger Zone</h2>
    <button id="deleteAccountBtn" class="btn-delete"><i class="fas fa-trash"></i> Delete Account Permanently</button>
    <div id="deleteMessage" class="message"></div>
  </div>
  <footer>© 2026 VECTOR CRASHER — ZENTRIX TECH</footer>
</div>
<a href="https://whatsapp.com/channel/0029VbD1fqe5kg6xDhBs5G3M" target="_blank" class="whatsapp-float">
  <i class="fab fa-whatsapp"></i>
</a>
<script>
  const token = localStorage.getItem('authToken') || sessionStorage.getItem('authToken');
  if (!token) window.location.href = '/login.html';
  let userData = null;

  function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
  async function logout() {
    await fetch('/api/logout', { method: 'POST' }).catch(()=>{});
    localStorage.removeItem('authToken'); sessionStorage.removeItem('authToken');
    window.location.href = '/login.html';
  }

  // Mouse glow & particles (same as before, omitted for brevity – reuse from previous code)
  const cursorGlow = document.getElementById('cursorGlow');
  document.addEventListener('mousemove', (e) => cursorGlow.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`);
  const canvas = document.getElementById('particles-canvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  function createParticles() {
    const count = 120;
    for (let i=0; i<count; i++) particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, radius: Math.random()*2.5+1, speedX: (Math.random()-0.5)*0.8, speedY: (Math.random()-0.5)*0.6, color: `rgba(0, ${Math.floor(150+Math.random()*105)}, 255, ${Math.random()*0.6+0.2})` });
  }
  function drawParticles() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for (let p of particles) { ctx.beginPath(); ctx.arc(p.x,p.y,p.radius,0,Math.PI*2); ctx.fillStyle = p.color; ctx.fill(); p.x += p.speedX; p.y += p.speedY; if (p.x<0) p.x = canvas.width; if (p.x>canvas.width) p.x=0; if (p.y<0) p.y = canvas.height; if (p.y>canvas.height) p.y=0; }
    requestAnimationFrame(drawParticles);
  }
  window.addEventListener('resize', () => { resizeCanvas(); particles = []; createParticles(); });
  resizeCanvas(); createParticles(); drawParticles();

  // Password strength meter (same as before)
  function checkStrength(pw) {
    let score = 0;
    if (pw.length >= 8) score++;
    if (pw.match(/[A-Z]/)) score++;
    if (pw.match(/[a-z]/)) score++;
    if (pw.match(/[0-9]/)) score++;
    if (pw.match(/[^A-Za-z0-9]/)) score++;
    const percent = (score / 5) * 100;
    let strength = 'Very Weak', color = '#ff4444';
    if (score >= 4) { strength = 'Strong'; color = '#00ff88'; }
    else if (score >= 3) { strength = 'Good'; color = '#aaff44'; }
    else if (score >= 2) { strength = 'Weak'; color = '#ffaa44'; }
    document.getElementById('strengthFill').style.width = percent + '%';
    document.getElementById('strengthFill').style.backgroundColor = color;
    document.getElementById('strengthText').innerText = strength;
    return score >= 3;
  }
  document.getElementById('newPassword')?.addEventListener('input', (e) => checkStrength(e.target.value));

  // Load profile
  async function loadProfile() {
    try {
      const res = await fetch('/api/user/profile', { headers: { 'Authorization': `Bearer ${token}` } });
      const data = await res.json();
      if (data.success) {
        userData = data.user;
        document.getElementById('email').value = userData.email;
        document.getElementById('age').value = userData.age || '';
        document.getElementById('gender').value = userData.gender || 'Other';
        document.getElementById('country').value = userData.country || '';
        document.getElementById('phone').value = userData.phone || '';
        const tier = userData.tier || 'lite';
        const tierBadge = tier === 'lite' ? '<span class="lite-badge">LITE</span>' : `<span class="premium-badge">${tier.toUpperCase()}</span>`;
        document.getElementById('tierDisplay').innerHTML = tierBadge;
        document.getElementById('expiresDisplay').innerHTML = `${userData.remainingTime || 'Expired'} (${userData.expiresAt ? new Date(userData.expiresAt).toLocaleDateString() : 'N/A'})`;
        if (userData.avatar) document.getElementById('avatarPreview').innerHTML = `<img src="${userData.avatar}">`;
        else document.getElementById('avatarPreview').innerHTML = '<i class="fas fa-user-secret"></i>';
      } else if (data.message === 'Unauthorized' || data.message === 'Session expired elsewhere') {
        localStorage.removeItem('authToken'); sessionStorage.removeItem('authToken');
        window.location.href = '/login.html';
      }
    } catch (err) { console.error(err); }
  }

  // Save profile changes
  async function saveProfile() {
    const age = document.getElementById('age').value;
    const gender = document.getElementById('gender').value;
    const country = document.getElementById('country').value.trim();
    const phone = document.getElementById('phone').value.trim();
    if (age && (age < 13 || age > 100)) { showMessage('profileMessage', '❌ Age must be between 13 and 100.', 'error'); return; }
    try {
      const res = await fetch('/api/user/update-profile', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ age, gender, country, phone })
      });
      const data = await res.json();
      if (data.success) showMessage('profileMessage', '✅ Profile updated!', 'success');
      else showMessage('profileMessage', `❌ ${data.message}`, 'error');
    } catch(err) { showMessage('profileMessage', '❌ Server error', 'error'); }
  }

  // Change password
  async function changePassword() {
    const oldPass = document.getElementById('oldPassword').value;
    const newPass = document.getElementById('newPassword').value;
    const confirm = document.getElementById('confirmPassword').value;
    if (!oldPass || !newPass) { showMessage('passwordMessage', '❌ Current and new password required', 'error'); return; }
    if (newPass !== confirm) { showMessage('passwordMessage', '❌ Passwords do not match', 'error'); return; }
    if (!checkStrength(newPass)) { showMessage('passwordMessage', '❌ Password too weak', 'error'); return; }
    try {
      const res = await fetch('/api/user/change-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ oldPassword: oldPass, newPassword: newPass })
      });
      const data = await res.json();
      if (data.success) showMessage('passwordMessage', '✅ Password changed!', 'success');
      else showMessage('passwordMessage', `❌ ${data.message}`, 'error');
    } catch(err) { showMessage('passwordMessage', '❌ Server error', 'error'); }
  }

  // Upload avatar
  async function uploadAvatar(file) {
    const formData = new FormData();
    formData.append('avatar', file);
    try {
      const res = await fetch('/api/user/upload-avatar', { method: 'POST', headers: { 'Authorization': `Bearer ${token}` }, body: formData });
      const data = await res.json();
      if (data.success) {
        document.getElementById('avatarPreview').innerHTML = `<img src="${data.avatarUrl}">`;
        showMessage('profileMessage', '✅ Avatar updated!', 'success');
      } else showMessage('profileMessage', `❌ ${data.message}`, 'error');
    } catch(err) { showMessage('profileMessage', '❌ Upload failed', 'error'); }
  }

  // Delete account
  async function deleteAccount() {
    if (!confirm('⚠️ PERMANENT: Delete your account and all data? Cannot undo.')) return;
    try {
      const res = await fetch('/api/user/delete-account', { method: 'POST', headers: { 'Authorization': `Bearer ${token}` } });
      const data = await res.json();
      if (data.success) {
        alert('Account deleted. Logging out...');
        localStorage.removeItem('authToken'); sessionStorage.removeItem('authToken');
        window.location.href = '/index.html';
      } else showMessage('deleteMessage', `❌ ${data.message}`, 'error');
    } catch(err) { showMessage('deleteMessage', '❌ Server error', 'error'); }
  }

  function showMessage(divId, msg, type) {
    const div = document.getElementById(divId);
    div.innerHTML = msg;
    div.className = `message ${type}`;
    setTimeout(() => { if (div.innerHTML === msg) div.innerHTML = ''; }, 5000);
  }

  document.getElementById('saveProfileBtn')?.addEventListener('click', saveProfile);
  document.getElementById('changePasswordBtn')?.addEventListener('click', changePassword);
  document.getElementById('deleteAccountBtn')?.addEventListener('click', deleteAccount);
  document.getElementById('avatarInput')?.addEventListener('change', (e) => { if (e.target.files[0]) uploadAvatar(e.target.files[0]); });

  loadProfile();
</script>
</body>
</html>
