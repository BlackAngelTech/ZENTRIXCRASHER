<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>VECTOR CRASHER | Unban Request</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a1a;
      font-family: 'Rajdhani', sans-serif;
      color: #eee;
      overflow-x: hidden;
      min-height: 100vh;
    }

    #particles-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    .scanlines {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(0deg, rgba(0,255,255,0.03) 0px, rgba(0,255,255,0.03) 2px, transparent 2px, transparent 6px);
      pointer-events: none;
      z-index: 3;
    }

    .grid-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(0,240,255,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,240,255,0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 2;
    }

    .cursor-glow {
      position: fixed;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,240,255,0.15), transparent 70%);
      pointer-events: none;
      transform: translate(-50%, -50%);
      z-index: 1;
      transition: transform 0.05s linear;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 20%, rgba(0,240,255,0.05), rgba(0,0,0,0.7));
      z-index: 1;
      pointer-events: none;
    }

    .hamburger {
      position: fixed;
      top: 25px;
      left: 25px;
      width: 45px;
      height: 45px;
      background: rgba(10, 20, 40, 0.9);
      border: 1px solid cyan;
      border-radius: 12px;
      cursor: pointer;
      z-index: 1001;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 6px;
      backdrop-filter: blur(8px);
      transition: 0.2s;
    }

    .hamburger:hover {
      background: cyan;
      box-shadow: 0 0 15px cyan;
    }

    .hamburger span {
      width: 25px;
      height: 3px;
      background: cyan;
      transition: 0.2s;
    }

    .hamburger:hover span {
      background: #000;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: -280px;
      width: 280px;
      height: 100%;
      background: rgba(5, 10, 20, 0.95);
      backdrop-filter: blur(20px);
      border-right: 2px solid cyan;
      z-index: 1000;
      transition: left 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      padding-top: 80px;
    }

    .sidebar.open {
      left: 0;
    }

    .sidebar a {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 15px 25px;
      color: #ccc;
      text-decoration: none;
      font-weight: 500;
      border-bottom: 1px solid rgba(0,240,255,0.1);
      transition: 0.2s;
    }

    .sidebar a i {
      width: 25px;
      color: cyan;
    }

    .sidebar a:hover {
      background: rgba(0,240,255,0.1);
      padding-left: 35px;
      color: white;
    }

    .container {
      position: relative;
      z-index: 10;
      max-width: 800px;
      margin: 0 auto;
      padding: 100px 20px 60px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 1s ease-out forwards;
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 40px;
    }

    .logo-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .logo-left svg {
      width: 55px;
      height: 55px;
      filter: drop-shadow(0 0 8px cyan);
      animation: pulseGlow 2s infinite;
    }

    @keyframes pulseGlow {
      0%, 100% { filter: drop-shadow(0 0 4px cyan); }
      50% { filter: drop-shadow(0 0 15px magenta); }
    }

    .logo-text {
      font-family: 'Orbitron', monospace;
      font-size: 1.8rem;
      font-weight: 900;
      background: linear-gradient(135deg, cyan, magenta);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: 2px;
    }

    .glass-card {
      background: rgba(10, 20, 40, 0.65);
      backdrop-filter: blur(16px);
      border-radius: 32px;
      padding: 40px 35px;
      border: 1px solid rgba(0,240,255,0.4);
      text-align: center;
    }

    h1 {
      font-family: 'Orbitron', monospace;
      font-size: 1.8rem;
      margin-bottom: 15px;
      color: cyan;
    }

    .subtitle {
      margin-bottom: 30px;
      color: #ccc;
    }

    .input-group {
      margin-bottom: 25px;
    }

    .input-group input, .input-group textarea {
      width: 100%;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(0,240,255,0.4);
      padding: 14px 18px;
      border-radius: 40px;
      color: #fff;
      font-size: 1rem;
      transition: 0.2s;
    }

    .input-group textarea {
      border-radius: 24px;
      resize: vertical;
      min-height: 100px;
    }

    .input-group input:focus, .input-group textarea:focus {
      outline: none;
      border-color: cyan;
      box-shadow: 0 0 12px rgba(0,240,255,0.3);
    }

    button {
      background: linear-gradient(135deg, #00f0ff, #aa00ff);
      border: none;
      padding: 14px 30px;
      border-radius: 40px;
      font-weight: bold;
      font-size: 1.1rem;
      color: #000;
      cursor: pointer;
      transition: 0.3s;
      width: 100%;
    }

    button:hover {
      transform: scale(1.02);
      box-shadow: 0 0 25px cyan;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .message {
      margin-top: 20px;
      padding: 10px;
      border-radius: 20px;
      font-size: 0.85rem;
    }

    .error {
      color: #ff6666;
      background: rgba(255,0,0,0.1);
    }

    .success {
      color: #66ff66;
      background: rgba(0,255,0,0.1);
    }

    .info {
      color: cyan;
      background: rgba(0,240,255,0.1);
    }

    .whatsapp-float {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #25D366;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      color: white;
      box-shadow: 0 0 20px rgba(37, 211, 102, 0.6);
      transition: 0.3s;
      z-index: 20;
      animation: pulseWhatsApp 1.5s infinite;
      text-decoration: none;
    }

    .whatsapp-float:hover {
      transform: scale(1.1);
      box-shadow: 0 0 35px #25D366;
    }

    @keyframes pulseWhatsApp {
      0% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7); }
      70% { box-shadow: 0 0 0 15px rgba(37, 211, 102, 0); }
      100% { box-shadow: 0 0 0 0 rgba(37, 211, 102, 0); }
    }

    footer {
      text-align: center;
      margin-top: 50px;
      font-size: 0.7rem;
      opacity: 0.6;
    }

    @media (max-width: 700px) {
      .container { padding: 80px 16px 40px; }
      .logo-left svg { width: 40px; height: 40px; }
      .logo-text { font-size: 1.3rem; }
      .glass-card { padding: 30px 20px; }
    }
  </style>
</head>
<body>

<canvas id="particles-canvas"></canvas>
<div class="scanlines"></div>
<div class="grid-overlay"></div>
<div class="cursor-glow" id="cursorGlow"></div>
<div class="overlay"></div>

<div class="hamburger" onclick="toggleSidebar()">
  <span></span><span></span><span></span>
</div>

<div class="sidebar" id="sidebar">
  <a href="/dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
  <a href="/connect.html"><i class="fab fa-whatsapp"></i> Connect Device</a>
  <a href="/ban.html"><i class="fas fa-skull"></i> Ban Panel</a>
  <a href="/unban.html"><i class="fas fa-infinity"></i> Unban Panel</a>
  <a href="/account.html"><i class="fas fa-user-cog"></i> Account</a>
  <a href="/developers.html"><i class="fas fa-code"></i> Developers / Support</a>
  <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
</div>

<div class="container">
  <div class="logo">
    <div class="logo-left">
      <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M50 10 L70 25 L80 50 L70 75 L50 90 L30 75 L20 50 L30 25 L50 10Z" fill="none" stroke="#00f0ff" stroke-width="2"/>
        <circle cx="38" cy="45" r="3" fill="#ff00ff"/>
        <circle cx="62" cy="45" r="3" fill="#ff00ff"/>
        <path d="M45 60 Q50 68 55 60" stroke="#00f0ff" stroke-width="2" fill="none"/>
        <path d="M50 75 L50 85 M40 80 L50 85 L60 80" stroke="#ff00ff" stroke-width="1.5"/>
      </svg>
      <span class="logo-text">UNBAN REQUEST</span>
    </div>
  </div>

  <div class="glass-card">
    <h1><i class="fas fa-hand-peace"></i> REQUEST UNBAN</h1>
    <div class="subtitle">
      Has your number been banned or crashed?<br>
      Fill the form below and an automatic unban script or support agent will assist you.
    </div>
    
    <div class="input-group">
      <input type="tel" id="bannedNumber" placeholder="Banned phone number (with country code, e.g., +447123456789)" required>
    </div>
    <div class="input-group">
      <textarea id="reason" placeholder="Optional: Additional information (reason, evidence, etc.)"></textarea>
    </div>
    
    <button id="submitBtn"><i class="fas fa-paper-plane"></i> SEND UNBAN REQUEST</button>
    
    <div id="messageDiv" class="message"></div>
  </div>
  <footer>© 2026 VECTOR CRASHER — ZENTRIX TECH</footer>
</div>

<a href="https://whatsapp.com/channel/0029VbD1fqe5kg6xDhBs5G3M" target="_blank" class="whatsapp-float">
  <i class="fab fa-whatsapp"></i>
</a>

<script>
  // Authentication check
  const token = localStorage.getItem('authToken') || sessionStorage.getItem('authToken');
  if (!token) {
    window.location.href = '/login.html';
  }

  // Sidebar toggle
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
  }

  async function logout() {
    await fetch('/api/logout', { method: 'POST' });
    localStorage.removeItem('authToken');
    sessionStorage.removeItem('authToken');
    window.location.href = '/login.html';
  }

  // Mouse glow
  const cursorGlow = document.getElementById('cursorGlow');
  document.addEventListener('mousemove', (e) => {
    cursorGlow.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
  });

  // Particles (reused from other pages)
  const canvas = document.getElementById('particles-canvas');
  const ctx = canvas.getContext('2d');
  let particles = [];

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function createParticles() {
    const particleCount = 120;
    for (let i = 0; i < particleCount; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: Math.random() * 2.5 + 1,
        speedX: (Math.random() - 0.5) * 0.8,
        speedY: (Math.random() - 0.5) * 0.6,
        color: `rgba(0, ${Math.floor(150 + Math.random() * 105)}, 255, ${Math.random() * 0.6 + 0.2})`
      });
    }
  }

  function drawParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let p of particles) {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
      p.x += p.speedX;
      p.y += p.speedY;
      if (p.x < 0) p.x = canvas.width;
      if (p.x > canvas.width) p.x = 0;
      if (p.y < 0) p.y = canvas.height;
      if (p.y > canvas.height) p.y = 0;
    }
    requestAnimationFrame(drawParticles);
  }

  window.addEventListener('resize', () => {
    resizeCanvas();
    particles = [];
    createParticles();
  });
  resizeCanvas();
  createParticles();
  drawParticles();

  // Form submission
  const submitBtn = document.getElementById('submitBtn');
  const bannedNumberInput = document.getElementById('bannedNumber');
  const reasonTextarea = document.getElementById('reason');
  const messageDiv = document.getElementById('messageDiv');

  function showMessage(msg, type) {
    messageDiv.innerHTML = msg;
    messageDiv.className = `message ${type}`;
    setTimeout(() => {
      if (messageDiv.innerHTML === msg) messageDiv.innerHTML = '';
    }, 8000);
  }

  async function sendUnbanRequest() {
    let bannedNumber = bannedNumberInput.value.trim();
    const reason = reasonTextarea.value.trim();

    if (!bannedNumber) {
      showMessage('❌ Please enter the banned phone number.', 'error');
      return;
    }
    // Normalize number: remove spaces, ensure it starts with +
    bannedNumber = bannedNumber.replace(/\s/g, '');
    if (!bannedNumber.startsWith('+')) {
      bannedNumber = '+' + bannedNumber;
    }
    // Basic check: at least 10 digits after +
    if (!/^\+\d{10,15}$/.test(bannedNumber)) {
      showMessage('❌ Invalid phone number format. Use international format with country code (e.g., +447123456789).', 'error');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> SENDING REQUEST...';
    showMessage('⏳ Sending unban request...', 'info');

    try {
      const res = await fetch('/api/unban/request', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ bannedNumber, reason })
      });
      const data = await res.json();
      if (data.success) {
        showMessage(`✅ Unban request sent! ${data.message || 'Support will contact you shortly.'}`, 'success');
        bannedNumberInput.value = '';
        reasonTextarea.value = '';
      } else {
        showMessage(`❌ Failed: ${data.message || 'Unknown error'}`, 'error');
      }
    } catch (err) {
      console.error(err);
      showMessage('❌ Server error. Please try again later.', 'error');
    } finally {
      submitBtn.disabled = false;
      submitBtn.innerHTML = '<i class="fas fa-paper-plane"></i> SEND UNBAN REQUEST';
    }
  }

  submitBtn.addEventListener('click', sendUnbanRequest);
</script>
</body>
</html>
